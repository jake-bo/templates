ROSTemplateFormatVersion: '2015-09-01'
Description: Create ECS instance with Elastic IP using Existing VPC and VSwitch
Parameters:
  InstanceName:
    Type: String
    Default: Ai-training-jupyter-instance
    Description: ECS instance name
  ImageId:
    Type: String
    Default: m-bp1f6lvwq2ovuc94evwx
    Description: Custom image ID
  InstanceType:
    Type: String
    Default: ecs.n1.small
    Description: Instance type
  SystemDiskSize:
    Type: Number
    Default: 40
    Description: System disk size (GB)
  KeyPairName:
    Type: String
    Default: test
    Description: Key pair name
  ExistingVpcId:
    Type: String
    Default: vpc-bp1un9hhh5xvvexvue3lj
    Description: ID of the existing VPC to use (e.g., vpc-bp1...)
  ExistingVSwitchId:
    Type: String
    Default: vsw-bp1ndov0tgc2obksnktrj
    Description: ID of the existing VSwitch to use (e.g., vsw-bp1...). Must belong to the specified VPC.
  SecurityGroupName:
    Type: String
    Default: jupyter-security-group-temp
    Description: Name for the new Security Group to be created in the existing VPC
  EipBandwidth:
    Type: Number
    Default: 100
    Description: EIP Bandwidth (Mbps)
Resources:
  NewSecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      SecurityGroupName:
        Ref: SecurityGroupName
      VpcId:
        Ref: ExistingVpcId
      Description: Security group for Jupyter instance in existing VPC
    DeletionPolicy: Delete
  SecurityGroupIngressSSH:
    Type: ALIYUN::ECS::SecurityGroupIngress
    Properties:
      SecurityGroupId:
        Ref: NewSecurityGroup
      IpProtocol: tcp
      PortRange: 22/22
      SourceCidrIp: 0.0.0.0/0
      Priority: 1
      NicType: internet
      Policy: accept
    DependsOn:
      - NewSecurityGroup
    DeletionPolicy: Delete
  SecurityGroupIngressJupyter:
    Type: ALIYUN::ECS::SecurityGroupIngress
    Properties:
      SecurityGroupId:
        Ref: NewSecurityGroup
      IpProtocol: tcp
      PortRange: 80/80
      SourceCidrIp: 0.0.0.0/0
      Priority: 1
      NicType: internet
      Policy: accept
    DependsOn:
      - NewSecurityGroup
    DeletionPolicy: Delete
  Eip:
    Type: ALIYUN::VPC::EIP
    Properties:
      Bandwidth:
        Ref: EipBandwidth
      InternetChargeType: PayByTraffic
    DeletionPolicy: Delete
  EcsInstance:
    Type: ALIYUN::ECS::Instance
    Properties:
      ImageId:
        Ref: ImageId
      InstanceType:
        Ref: InstanceType
      SecurityGroupIds:
        - Ref: NewSecurityGroup
      VpcId:
        Ref: ExistingVpcId
      VSwitchId:
        Ref: ExistingVSwitchId
      InstanceName:
        Ref: InstanceName
      SystemDiskCategory: cloud_efficiency
      SystemDiskSize:
        Ref: SystemDiskSize
      InternetMaxBandwidthOut: 0
      InternetChargeType: PayByTraffic
      KeyPairName:
        Ref: KeyPairName
      PasswordInherit: false
    DependsOn:
      - NewSecurityGroup
      - SecurityGroupIngressSSH
      - SecurityGroupIngressJupyter
    DeletionPolicy: Delete
  EipAssociation:
    Type: ALIYUN::VPC::EIPAssociation
    Properties:
      InstanceId:
        Fn::GetAtt:
          - EcsInstance
          - InstanceId
      AllocationId:
        Fn::GetAtt:
          - Eip
          - AllocationId
    DependsOn:
      - EcsInstance
      - Eip
    DeletionPolicy: Delete
Outputs:
  InstanceId:
    Value:
      Fn::GetAtt:
        - EcsInstance
        - InstanceId
    Description: Created ECS instance ID
  PublicIp:
    Value:
      Fn::GetAtt:
        - Eip
        - EipAddress
    Description: Elastic IP address
  PrivateIp:
    Value:
      Fn::GetAtt:
        - EcsInstance
        - PrivateIp
    Description: ECS instance private IP
  UsedVpcId:
    Value:
      Ref: ExistingVpcId
    Description: ID of the existing VPC used
  UsedVSwitchId:
    Value:
      Ref: ExistingVSwitchId
    Description: ID of the existing VSwitch used
  SecurityGroupId:
    Value:
      Ref: NewSecurityGroup
    Description: Created Security Group ID
